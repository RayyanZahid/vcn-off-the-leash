<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ShaderGradient — sphere</title>
<style>
  html,body{margin:0;height:100%;background:#000;overflow:hidden}
  #root{position:fixed;inset:0}
  #root canvas{display:block}
</style>
</head>
<body>
<div id="root"></div>
<script type="importmap">
{"imports":{
  "react":"https://esm.sh/react@19.1.0",
  "react/jsx-runtime":"https://esm.sh/react@19.1.0/jsx-runtime",
  "react-dom":"https://esm.sh/react-dom@19.1.0",
  "react-dom/client":"https://esm.sh/react-dom@19.1.0/client"
}}
</script>
<script type="module">
import React from "react";
import { createRoot } from "react-dom/client";
import { ShaderGradientCanvas, ShaderGradient } from "https://esm.sh/@shadergradient/react@2.4.20?external=react,react-dom";

const h = React.createElement;
const root = createRoot(document.getElementById("root"));

// Props supplied by Ray (shadergradient.co customize export), sphere type, green on black.
const GRADIENT = {
  animate: "on", axesHelper: "off",
  bgColor1: "#000000", bgColor2: "#000000",
  brightness: 1.2,
  cAzimuthAngle: 250, cDistance: 1.52, cPolarAngle: 140, cameraZoom: 21.3,
  color1: "#008100", color2: "#00ff00", color3: "#00ff1a",
  destination: "onCanvas", embedMode: "off", envPreset: "lobby",
  format: "gif", fov: 40, frameRate: 10,
  gizmoHelper: "hide", grain: "on", lightType: "3d",
  pixelDensity: 1,
  positionX: 0.5, positionY: 1.2, positionZ: 0.7,
  range: "disabled", rangeEnd: 40, rangeStart: 0,
  reflection: 0.5,
  rotationX: 0, rotationY: 0, rotationZ: 140,
  shader: "defaults", type: "sphere",
  uAmplitude: 7, uDensity: 0.8, uFrequency: 5.5, uSpeed: 0.3, uStrength: 0.4,
  uTime: 0, wireframe: false,
};

function App() {
  const [animate, setAnimate] = React.useState("on");
  React.useEffect(() => {
    const onMsg = (e) => {
      if (e.data === "vcn:pause") setAnimate("off");
      else if (e.data === "vcn:run") setAnimate("on");
    };
    window.addEventListener("message", onMsg);
    return () => window.removeEventListener("message", onMsg);
  }, []);
  return h(
    ShaderGradientCanvas,
    { style: { position: "fixed", inset: 0, width: "100%", height: "100%" }, pixelDensity: 1, pointerEvents: "none" },
    h(ShaderGradient, { control: "props", ...GRADIENT, animate })
  );
}

root.render(h(App));
</script>
</body>
</html>
